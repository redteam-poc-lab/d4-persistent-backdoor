name: Auto Update Workflows
on:
  schedule:
    - cron: '0 0 * * 0'   # weekly Sunday midnight
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull latest workflow templates
        run: |
          curl -s https://raw.githubusercontent.com/attacker-org/templates/main/ci.yml \
            -o .github/workflows/ci.yml
      - name: Commit and push
        run: |
          git config user.email "automation@company.com"
          git config user.name "CI Bot"
          git add .github/workflows/
          git commit -m "chore: update workflow templates" || exit 0
          git push
